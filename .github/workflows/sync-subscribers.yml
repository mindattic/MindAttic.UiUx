name: Sync content to subscribers

# ====================================================================
# This workflow only handles the three remaining "splice-in-place"
# subscribers that MindAttic.UiUx still owns: mindattic.com (html-inline),
# StreetSamurai (blazor-wwwroot), and MindAttic.Psst legal pages
# (html-inline-multi -> terms.htm/privacy.htm).
#
# Catalog landing pages and the Claudia/ChiMesh long-form HTML builds are
# rendered by MindAttic.Deploy now -- they pull components from jsDelivr
# at runtime instead of being spliced. Do not re-add legs here for those
# subscribers.
# ====================================================================

on:
  push:
    branches: [main]
    paths:
      - 'Components/AtticFont/**'
      - 'Components/BackHomeM/**'
      - 'Components/Cyberspace/**'
      - 'Components/OutfitFont/**'
      - 'Components/PinFooter/**'
      - 'Components/WebSnapshot/**'
      - 'subscribers.json'
      - 'sync/**'
      - '.github/workflows/sync-subscribers.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-mindattic-com:
    name: Sync into mindattic.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MindAttic.UiUx
        uses: actions/checkout@v4
        with:
          path: content

      - name: Checkout mindattic.com
        uses: actions/checkout@v4
        with:
          repository: mindattic/mindattic.com
          path: mindattic-com
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}

      - name: Run sync-mindattic-com.ps1
        shell: pwsh
        run: |
          ./content/sync/sync-mindattic-com.ps1 `
            -ContentRoot "$PWD/content" `
            -TargetIndex "$PWD/mindattic-com/index.htm"

      - name: Open or update PR if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          path: mindattic-com
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}
          commit-message: "chore(components): sync from MindAttic.UiUx@${{ github.sha }}"
          title: "Sync from MindAttic.UiUx"
          body: |
            Automated sync from [MindAttic.UiUx@${{ github.sha }}](https://github.com/mindattic/MindAttic.UiUx/commit/${{ github.sha }}).

            Marker blocks in `index.htm` regenerated from canonical sources.
          branch: auto/sync-components
          base: main
          delete-branch: true
          author: "MindAttic Components Bot <noreply@mindattic.com>"
          committer: "MindAttic Components Bot <noreply@mindattic.com>"

  sync-streetsamurai:
    name: Sync into StreetSamurai
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MindAttic.UiUx
        uses: actions/checkout@v4
        with:
          path: content

      - name: Checkout StreetSamurai
        uses: actions/checkout@v4
        with:
          repository: mindattic/StreetSamurai
          path: streetsamurai
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}

      - name: Run sync-streetsamurai.ps1
        shell: pwsh
        run: |
          ./content/sync/sync-streetsamurai.ps1 `
            -ContentRoot "$PWD/content" `
            -BlazorRoot "$PWD/streetsamurai/v3/StreetSamurai.Blazor"

      - name: Open or update PR if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          path: streetsamurai
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}
          commit-message: "chore(components): sync from MindAttic.UiUx@${{ github.sha }}"
          title: "Sync from MindAttic.UiUx"
          body: |
            Automated sync from [MindAttic.UiUx@${{ github.sha }}](https://github.com/mindattic/MindAttic.UiUx/commit/${{ github.sha }}).

            - `wwwroot/js/*.js` overwritten with fresh copies
            - `wwwroot/app.css` marker blocks regenerated
          branch: auto/sync-components
          base: master
          delete-branch: true
          author: "MindAttic Components Bot <noreply@mindattic.com>"
          committer: "MindAttic Components Bot <noreply@mindattic.com>"

  sync-mindattic-psst:
    name: Sync into MindAttic.Psst (terms.htm + privacy.htm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MindAttic.UiUx
        uses: actions/checkout@v4
        with:
          path: content

      - name: Checkout MindAttic.Psst
        uses: actions/checkout@v4
        with:
          repository: mindattic/MindAttic.Psst
          path: mindattic-psst
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}

      - name: Run sync-mindattic-psst.ps1 (privacy.htm + terms.htm)
        shell: pwsh
        run: |
          ./content/sync/sync-mindattic-psst.ps1 `
            -ContentRoot "$PWD/content" `
            -TargetRoot "$PWD/mindattic-psst"

      - name: Open or update PR if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          path: mindattic-psst
          token: ${{ secrets.SUBSCRIBER_REPO_TOKEN }}
          commit-message: "chore(components): sync from MindAttic.UiUx@${{ github.sha }}"
          title: "Sync from MindAttic.UiUx"
          body: |
            Automated sync from [MindAttic.UiUx@${{ github.sha }}](https://github.com/mindattic/MindAttic.UiUx/commit/${{ github.sha }}).

            Marker blocks in `privacy.htm` and `terms.htm` regenerated from canonical sources. The repo's `index.htm` is rendered by MindAttic.Deploy from `README.md`; it is not touched by this workflow.
          branch: auto/sync-components
          base: main
          delete-branch: true
          author: "MindAttic Components Bot <noreply@mindattic.com>"
          committer: "MindAttic Components Bot <noreply@mindattic.com>"
