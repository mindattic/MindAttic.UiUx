<!-- ════════════════════════════════════════════════════════════════════════
     MindAttic.UIUX - OutfitFont/outfit-font.html

     Outfit (Google Fonts, weights 100-900, variable axis) inlined as
     base64 woff2. Two @font-face declarations: Latin (U+0000-00FF, ...)
     and Latin-Extended (U+0100-02BA, ...). No network request; the font
     ships with the document.

     Use either form on any element:
         body { font-family: 'Outfit', system-ui, sans-serif; }     /* explicit */
         body { font-family: var(--font-outfit); }                  /* via :root variable */

     Gotcha: bare `font-family: Outfit;` (no quotes, no fallback) can fail
     silently. Use the quoted stack OR the var() shorthand.

     Companion CSS: outfit-font.css   (two @font-face blocks + --font-outfit variable)
     ════════════════════════════════════════════════════════════════════════ -->
