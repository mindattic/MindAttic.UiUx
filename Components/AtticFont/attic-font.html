<!-- ════════════════════════════════════════════════════════════════════════
     MindAttic.UIUX - AtticFont/attic-font.html

     Attic display face inlined as base64 woff2. Single @font-face,
     weight normal, style normal, font-display swap. No network request;
     the font ships with the document.

     Use either form on any element:
         h1, .title { font-family: 'Attic', serif; }       /* explicit */
         h1, .title { font-family: var(--font-attic); }    /* via :root variable */

     Gotcha: bare `font-family: Attic;` (no quotes, no fallback) can fail
     silently. Use the quoted stack OR the var() shorthand.

     Companion CSS: attic-font.css   (single @font-face block + --font-attic variable)
     ════════════════════════════════════════════════════════════════════════ -->
