<!-- ════════════════════════════════════════════════════════════════════════
     MindAttic.UIUX - PinFooter/pin-footer.html

     Pin-when-short does not inject any DOM. Subscribers opt in by adding the
     class `pin-when-short` to whichever element they want pinned to the
     bottom of the viewport when the page is shorter than the viewport.

         <footer class="pin-when-short">...</footer>

     Companion CSS: pin-footer.css   (.pin-when-short.pinned)
     Companion JS:  pin-footer.js    (toggles .pinned on resize / mutation)
     ════════════════════════════════════════════════════════════════════════ -->
