<!-- ════════════════════════════════════════════════════════════════════════
     MindAttic.UIUX - BackHomeM/back-home-m.html

     A capital "M" in AtticFont pinned to the upper-left, linking back to
     mindattic.com. No JS — just an <a href> styled into a return button.
     Requires AtticFont/ to also be synced into the subscriber (depends on the
     'Attic' @font-face).

     Drop this anchor once anywhere inside <body>:

         <a class="back-home-m" href="https://mindattic.com"
            aria-label="Back to mindattic.com" title="Back to mindattic.com"></a>

     The "❮ M" glyphs are injected via CSS ::before, so the anchor itself
     stays empty.

     Companion CSS: back-home-m.css   (positioning + AtticFont stack)
     ════════════════════════════════════════════════════════════════════════ -->
